# Cloud Build configuration for Agentic AI-Pandit
# Uses Docker-based deployment (matching ai-pandit-app pattern)

availableSecrets:
  secretManager:
    - versionName: projects/agentic-ai-pandit/secrets/neon-database-url/versions/latest
      env: 'NEON_DATABASE_URL'
    - versionName: projects/agentic-ai-pandit/secrets/redis-url/versions/latest
      env: 'REDIS_URL'
    - versionName: projects/agentic-ai-pandit/secrets/clerk-secret-key/versions/latest
      env: 'CLERK_SECRET_KEY'
    - versionName: projects/agentic-ai-pandit/secrets/encryption-secret/versions/latest
      env: 'ENCRYPTION_SECRET'
    - versionName: projects/agentic-ai-pandit/secrets/sentry-dsn/versions/latest
      env: 'SENTRY_DSN'

steps:
  # Build and push API Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'backend/Dockerfile'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/backend-images/backend-api:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/backend-images/backend-api:latest'
      - 'backend/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/backend-images/backend-api:${SHORT_SHA}'

  # Build and push Ephemeris Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-f'
      - 'backend/ephemeris/Dockerfile'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/backend-images/ephemeris-service:${SHORT_SHA}'
      - '-t'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/backend-images/ephemeris-service:latest'
      - 'backend/'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/backend-images/ephemeris-service:${SHORT_SHA}'

  # Deploy API to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy backend-api \
          --image ${_REGION}-docker.pkg.dev/${PROJECT_ID}/backend-images/backend-api:${SHORT_SHA} \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --memory 512Mi \
          --cpu 1 \
          --concurrency 20 \
          --min-instances 0 \
          --max-instances 10 \
          --timeout 3600 \
          --set-env-vars APP_ENV=production,APP_PORT=8000,EPHEMERIS_SERVICE_URL=${_EPHEMERIS_SERVICE_URL},EPHEMERIS_SERVICE_TIMEOUT_MS=15000,USE_ASYNC_JOB_PIPELINE=true,JOB_EXECUTION_MODE=inline,GOOGLE_CLOUD_PROJECT=${PROJECT_ID} \
          --set-secrets NEON_DATABASE_URL=neon-database-url:latest,REDIS_URL=redis-url:latest,CLERK_SECRET_KEY=clerk-secret-key:latest,ENCRYPTION_SECRET=encryption-secret:latest,SENTRY_DSN=sentry-dsn:latest

  # Deploy Ephemeris to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        gcloud run deploy ephemeris-service \
          --image ${_REGION}-docker.pkg.dev/${PROJECT_ID}/backend-images/ephemeris-service:${SHORT_SHA} \
          --region ${_REGION} \
          --platform managed \
          --allow-unauthenticated \
          --memory 1Gi \
          --cpu 1 \
          --concurrency 5 \
          --min-instances 0 \
          --max-instances 5 \
          --no-cpu-throttling \
          --timeout 300 \
          --set-env-vars APP_ENV=production

images:
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/backend-images/backend-api:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/backend-images/backend-api:latest'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/backend-images/ephemeris-service:${SHORT_SHA}'
  - '${_REGION}-docker.pkg.dev/${PROJECT_ID}/backend-images/ephemeris-service:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: 1800s

substitutions:
  _REGION: asia-southeast1
  _FRONTEND_URL: https://agentic-ai-pandit-ai-pandits-projects.vercel.app
  _EPHEMERIS_SERVICE_URL: http://ephemeris-service
