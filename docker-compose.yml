version: "3.9"

x-app-vars: &app-vars
  APP_ENV: development
  NEON_DATABASE_URL: postgresql+asyncpg://ai_pandit:ai_pandit_dev@db:5432/ai_pandit
  REDIS_URL: redis://redis:6379/0
  REDIS_TLS: "false"
  CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-sk_test_placeholder}
  GROQ_API_KEY: ${GROQ_API_KEY:-}
  ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
  DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
  ENCRYPTION_SECRET: ${ENCRYPTION_SECRET:-development_secret_key_32chars!!}
   GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-agentic-ai-pandit}
  SENTRY_DSN: ${SENTRY_DSN:-}
  OTEL_ENABLED: "false"
  EPHEMERIS_SERVICE_URL: http://ephemeris:8001
  ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173

services:
  ephemeris:
    build:
      context: ./backend
      dockerfile: ephemeris/Dockerfile
    ports:
      - "8001:8001"
    volumes:
      - skyfield_data:/root/.skyfield
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ai_pandit
      POSTGRES_USER: ai_pandit
      POSTGRES_PASSWORD: ai_pandit_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ai_pandit"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      <<: *app-vars
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      ephemeris:
        condition: service_healthy

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${CLERK_PUBLISHABLE_KEY:-pk_test_placeholder}
      NEXT_PUBLIC_BACKEND_URL: http://app:8000
    depends_on:
      app:
        condition: service_started

  migrate:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      <<: *app-vars
    command: sh -c "alembic upgrade head"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migrations

volumes:
  pgdata:
  skyfield_data:
